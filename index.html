<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>E-Bike Pusher (WebBLE)</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #fff; text-align: center; margin: 0; padding: 10px; }
    .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 10px; }
    .card { background: #1e1e1e; border-radius: 8px; padding: 15px; width: 100px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
    .val { font-size: 24px; font-weight: bold; margin: 10px 0; color: #00ea8d; }
    .lbl { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    .alert { color: #ff3b30 !important; }
    .panel { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-top: 15px; text-align: left; }
    input { width: 80px; padding: 5px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; float: right; }
    button { background: #00d2ff; color: #000; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
    .danger { background: #ff3b30; color: white; }
    p { margin: 8px 0; clear: both; overflow: hidden; line-height: 24px; font-size: 14px; color: #ddd; }
    textarea { width: 100%; height: 120px; background: #000; color: #0f0; border: 1px solid #333; padding: 5px; font-family: monospace; font-size: 11px; resize: none; box-sizing: border-box; }
  </style>
</head>
<body>
  <h2 style="color: #00d2ff; margin-bottom: 5px;">Pusher Dashboard</h2>
  <button id="connectBtn" onclick="connectBLE()">Connect to Bike</button>
  
  <div class="grid">
    <div class="card"><div class="lbl">Status</div><div class="val" id="b_stat">--</div></div>
    <div class="card"><div class="lbl">Cadence</div><div class="val" id="cad">--</div></div>
    <div class="card"><div class="lbl">Elec Pwr (W)</div><div class="val" id="pwr">--</div></div>
    <div class="card"><div class="lbl">Battery (V)</div><div class="val" id="vol">--</div></div>
    <div class="card"><div class="lbl">Phase (A)</div><div class="val" id="amp">--</div></div>
    <div class="card"><div class="lbl">Brk Factor</div><div class="val" id="prb">--</div></div>
  </div>

  <div class="panel">
    <h3 style="margin-top:0; color:#aaa;">System Log</h3>
    <textarea id="syslog" readonly></textarea>
  </div>

  <div class="panel">
    <h3 style="margin-top:0; color:#aaa;">Live Tuning & Settings</h3>
    <p>Brake Threshold: <input type="number" id="th" onchange="sendTuning()"></p>
    <p>Timeout (ms): <input type="number" id="ti" onchange="sendTuning()"></p>
    <p>Max Push Force (A): <input type="number" step="0.1" id="tm" onchange="sendTuning()"></p>
    <p>Brake Smoothing: <input type="number" step="0.01" id="ba" onchange="sendTuning()"></p>
    <button onclick="commitSettings()">Save to EEPROM</button>
    
    <hr style="border-color:#333; margin:15px 0;">
    <p style="width: 100%;">Home SSID: <input type="text" id="ssid" style="width: 150px;"></p>
    <p style="width: 100%;">Home Pass: <input type="password" id="psk" style="width: 150px;"></p>
    <button onclick="saveWiFi()">Save WiFi & Reboot</button>

    <hr style="border-color:#333; margin:15px 0;">
    <button class="danger" onclick="sendCommand('SCAN')">Scan for new BLE Sensor</button>
    <button class="danger" style="background:#ff9500" onclick="sendCommand('OTA')">Enable Maintenance Mode</button>
  </div>

  <script>
    const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const TX_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
    const RX_UUID = "828917c1-ea55-4d4a-a66e-fd202cea0645";
    const LOG_UUID = "5111b1db-2917-48f8-b3d5-e51c8f35fc06";
    let bleRxChar = null;

    async function connectBLE() {
      try {
        const device = await navigator.bluetooth.requestDevice({ filters:[{ name: 'E-Bike Pusher' }], optionalServices: [SERVICE_UUID] });
        document.getElementById("connectBtn").innerText = "Connecting...";
        
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        
        bleRxChar = await service.getCharacteristic(RX_UUID);
        const txChar = await service.getCharacteristic(TX_UUID);
        const logChar = await service.getCharacteristic(LOG_UUID);
        
        await txChar.startNotifications();
        txChar.addEventListener('characteristicvaluechanged', handleTelemetry);
        
        await logChar.startNotifications();
        logChar.addEventListener('characteristicvaluechanged', handleLiveLog);
        
        document.getElementById("connectBtn").innerText = "Connected!";
        document.getElementById("connectBtn").style.background = "#00ea8d";

        setTimeout(() => sendCommand("GET"), 500);

      } catch(e) { 
        alert("Connection Failed."); 
        document.getElementById("connectBtn").innerText = "Connect to Bike"; 
      }
    }

    function handleTelemetry(event) {
      const value = new TextDecoder().decode(event.target.value);
      try {
        const d = JSON.parse(value);
        
        if (d.cfg) {
          document.getElementById("th").value = d.th;
          document.getElementById("ti").value = d.ti;
          document.getElementById("tm").value = d.tm.toFixed(2);
          document.getElementById("ba").value = d.ba.toFixed(2);
          document.getElementById("ssid").value = d.s;
          document.getElementById("psk").value = d.p;
          return;
        }

        document.getElementById("cad").innerText = d.c;
        document.getElementById("pwr").innerText = d.p.toFixed(0);
        document.getElementById("vol").innerText = d.v.toFixed(1);
        document.getElementById("amp").innerText = d.a.toFixed(1);
        document.getElementById("prb").innerText = d.pr.toFixed(2);
        
        let bs = document.getElementById("b_stat");
        if(d.b) { bs.innerText = "BRAKING"; bs.classList.add("alert"); } else { bs.innerText = "COAST"; bs.classList.remove("alert"); }
      } catch(e) {}
    }

    function handleLiveLog(event) {
      const msg = new TextDecoder().decode(event.target.value);
      let logbox = document.getElementById("syslog");
      logbox.value += msg + "\n";
      logbox.scrollTop = logbox.scrollHeight;
    }

    async function sendCommand(cmd) { if (!bleRxChar) return; let encoder = new TextEncoder(); await bleRxChar.writeValue(encoder.encode(cmd)); }
    
    function sendTuning() {
      let th = document.getElementById("th").value;
      let ti = document.getElementById("ti").value;
      let tm = document.getElementById("tm").value;
      let ba = document.getElementById("ba").value;
      sendCommand(`CFG:${th}:${ti}:${tm}:${ba}`);
    }

    function commitSettings() {
      sendCommand("SAVE");
      alert("Tuning locked into EEPROM!");
    }

    function saveWiFi() {
      let ssid = document.getElementById("ssid").value;
      let psk = document.getElementById("psk").value;
      sendCommand("WIFI:" + ssid + ":" + psk);
      alert("WiFi Saved! Rebooting...");
    }
  </script>
</body>
</html>
