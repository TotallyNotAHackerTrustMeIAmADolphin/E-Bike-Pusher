<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>E-Bike Pusher (WebBLE)</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #121212;
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 10px;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }

    .card {
      background: #1e1e1e;
      border-radius: 8px;
      padding: 15px;
      width: 100px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
    }

    .val {
      font-size: 24px;
      font-weight: bold;
      margin: 10px 0;
      color: #00ea8d;
    }

    .lbl {
      font-size: 10px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .panel {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
      text-align: left;
    }

    input {
      width: 80px;
      padding: 5px;
      background: #333;
      color: white;
      border: 1px solid #555;
      border-radius: 4px;
      float: right;
    }

    button {
      background: #00d2ff;
      color: #000;
      border: none;
      padding: 12px;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }

    .danger {
      background: #ff3b30;
      color: white;
    }

    p {
      margin: 8px 0;
      clear: both;
      overflow: hidden;
      line-height: 24px;
      font-size: 14px;
      color: #ddd;
    }

    textarea {
      width: 100%;
      height: 120px;
      background: #000;
      color: #0f0;
      border: 1px solid #333;
      padding: 5px;
      font-family: monospace;
      font-size: 11px;
      resize: none;
      box-sizing: border-box;
    }
  </style>
</head>

<body>
  <h2 style="color: #00d2ff; margin-bottom: 5px;">Pusher Dashboard</h2>
  <button id="connectBtn" onclick="connectBLE()">Connect to Bike</button>
  
  <div class="grid">
    <div class="card"><div class="lbl">Cadence</div><div class="val" id="cad">--</div></div>
    <div class="card"><div class="lbl">Pwr (W)</div><div class="val" id="pwr">--</div></div>
    <div class="card"><div class="lbl">Batt (V)</div><div class="val" id="vol">--</div></div>
    <div class="card"><div class="lbl">Filter</div><div class="val" id="prb">--</div></div>
    <div class="card"><div class="lbl">Target (A)</div><div class="val" id="tq">--</div></div>
  </div>

  <div class="panel">
    <h3 style="margin-top:0; color:#aaa;">System Log</h3>
    <textarea id="syslog" readonly></textarea>
  </div>

  <div class="panel">
    <h3 style="margin-top:0; color:#aaa;">Live Tuning</h3>
    <p>Max Push Force (A): <input type="number" step="0.1" id="tm" oninput="sendTuning()"></p>
    <p>Filter Time (s): <input type="number" step="0.1" id="tc" oninput="sendTuning()"></p>
    <button onclick="commitSettings()">Save to Flash</button>
    <hr style="border-color:#333; margin:15px 0;">
    <p>Home SSID: <input type="text" id="ssid"></p>
    <p>Home Pass: <input type="password" id="psk"></p>
    <button onclick="saveWiFi()">Save WiFi & Reboot</button>
    <hr style="border-color:#333; margin:15px 0;">
    <button class="danger" onclick="sendCommand('SCAN')">Scan New Cadence Sensor</button>
    <button class="danger" style="background:#ff9500" onclick="sendCommand('OTA')">OTA Mode</button>
  </div>

  <script>
    // ... (Keep UUIDs and connectBLE) ...

    function handleTelemetry(event) {
      const value = new TextDecoder().decode(event.target.value);
      try {
        const d = JSON.parse(value);
        if (d.cfg) {
          document.getElementById("tm").value = d.tm.toFixed(2);
          document.getElementById("tc").value = d.tc.toFixed(2);
          document.getElementById("ssid").value = d.s;
          return;
        }
        document.getElementById("cad").innerText = d.c;
        document.getElementById("pwr").innerText = d.p.toFixed(0);
        document.getElementById("vol").innerText = d.v.toFixed(1);
        document.getElementById("prb").innerText = d.pr.toFixed(2);
        document.getElementById("tq").innerText = d.tq.toFixed(2);
        document.getElementById("tq").style.color = (d.tq < 0) ? "#ff3b30" : "#00ea8d";
      } catch(e) {}
    }

    function sendTuning() {
      clearTimeout(window.tuneTimer);
      window.tuneTimer = setTimeout(() => {
        let tm = document.getElementById("tm").value;
        let tc = document.getElementById("tc").value;
        sendCommand(`CFG:${tm}:${tc}`);
      }, 500); 
    }
    // ... (Keep saveWiFi, commitSettings, etc.) ...
  </script>
</body>

</html>
