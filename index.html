<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>E-Bike Pusher (WebBLE)</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #fff; text-align: center; margin: 0; padding: 10px; }
    .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 10px; }
    .card { background: #1e1e1e; border-radius: 8px; padding: 15px; width: 135px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
    .val { font-size: 26px; font-weight: bold; margin: 10px 0; color: #00ea8d; }
    .lbl { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    .alert { color: #ff3b30 !important; }
    .panel { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-top: 15px; text-align: left; }
    input { width: 80px; padding: 5px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; float: right; }
    button { background: #00d2ff; color: #000; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
    .danger { background: #ff3b30; color: white; }
    p { margin: 8px 0; clear: both; overflow: hidden; line-height: 24px; font-size: 14px; color: #ddd; }
  </style>
</head>
<body>
  <h2 style="color: #00d2ff; margin-bottom: 5px;">Pusher Dashboard</h2>
  <button id="connectBtn" onclick="connectBLE()">Connect to Bike</button>
  
  <div class="grid">
    <div class="card"><div class="lbl">Brake Status</div><div class="val" id="b_stat">--</div></div>
    <div class="card"><div class="lbl">Cadence (RPM)</div><div class="val" id="cad">--</div></div>
    <div class="card"><div class="lbl">Power (W)</div><div class="val" id="pwr">--</div></div>
    <div class="card"><div class="lbl">Brake Factor</div><div class="val" id="prb">--</div></div>
  </div>

  <div class="panel">
    <h3 style="margin-top:0; color:#aaa;">Tuning & Settings</h3>
    <p>Brake Threshold: <input type="number" id="th"></p>
    <p>Timeout (ms): <input type="number" id="ti"></p>
    <p>Max Push Force (A): <input type="number" step="0.1" id="tm"></p>
    <p>Brake Smoothing: <input type="number" step="0.01" id="ba"></p>
    <button onclick="saveSettings()">Save Tuning</button>
    
    <hr style="border-color:#333; margin:15px 0;">
    <button class="danger" onclick="sendCommand('SCAN')">Scan for new BLE Cadence Sensor</button>
    <button class="danger" style="background:#ff9500" onclick="sendCommand('OTA')">Enable Maintenance Mode (OTA Updates)</button>
  </div>

  <script>
    const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const TX_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
    const RX_UUID = "828917c1-ea55-4d4a-a66e-fd202cea0645";
    
    let bleRxChar = null;

    async function connectBLE() {
      try {
        const device = await navigator.bluetooth.requestDevice({
          filters: [{ name: 'E-Bike Pusher' }],
          optionalServices: [SERVICE_UUID]
        });
        
        document.getElementById("connectBtn").innerText = "Connecting...";
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        
        bleRxChar = await service.getCharacteristic(RX_UUID);
        const txChar = await service.getCharacteristic(TX_UUID);
        
        await txChar.startNotifications();
        txChar.addEventListener('characteristicvaluechanged', handleTelemetry);
        
        document.getElementById("connectBtn").innerText = "Connected!";
        document.getElementById("connectBtn").style.background = "#00ea8d";
      } catch(e) {
        console.error(e);
        alert("Connection Failed. Make sure your phone's Bluetooth is on!");
        document.getElementById("connectBtn").innerText = "Connect to Bike";
      }
    }

    function handleTelemetry(event) {
      const value = new TextDecoder().decode(event.target.value);
      try {
        const d = JSON.parse(value);
        document.getElementById("cad").innerText = d.c;
        document.getElementById("pwr").innerText = d.p.toFixed(1);
        document.getElementById("prb").innerText = d.pr;
        
        let bs = document.getElementById("b_stat");
        if(d.b) { bs.innerText = "BRAKING"; bs.classList.add("alert"); } 
        else { bs.innerText = "COAST"; bs.classList.remove("alert"); }
        
        // Update input boxes if not actively typing
        if (document.activeElement !== document.getElementById('th')) document.getElementById("th").value = d.th;
        if (document.activeElement !== document.getElementById('ti')) document.getElementById("ti").value = d.ti;
        if (document.activeElement !== document.getElementById('tm')) document.getElementById("tm").value = d.tm.toFixed(3);
        if (document.activeElement !== document.getElementById('ba')) document.getElementById("ba").value = d.ba.toFixed(2);
      } catch(e) {}
    }

    async function sendCommand(cmd) {
      if (!bleRxChar) return alert("Connect via Bluetooth first!");
      let encoder = new TextEncoder();
      await bleRxChar.writeValue(encoder.encode(cmd));
      if (cmd === 'OTA' || cmd === 'SCAN') alert("Command Sent! ESP32 Rebooting...");
    }

    function saveSettings() {
      sendCommand("SET:th:" + document.getElementById("th").value);
      setTimeout(() => sendCommand("SET:ti:" + document.getElementById("ti").value), 100);
      setTimeout(() => sendCommand("SET:tm:" + document.getElementById("tm").value), 200);
      setTimeout(() => sendCommand("SET:ba:" + document.getElementById("ba").value), 300);
      alert("Settings sent to Bike!");
    }
  </script>
</body>
</html>
